<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Full Screen Div Blueprint</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    .full-screen-div {
      width: 210mm;
      height: 297mm;
      border: 4px solid black;
      box-sizing: border-box;
      display: flex;
    }

    .left-panel {
      width: 30%;
      height: 297mm; /* Ensure full screen height */
      background-color: #f0f0f0;
      border-right: 2px solid gray;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
    }

    .section {
      padding: 10px;
      background-color: #ddd;
      border: 1px solid #aaa;
      box-sizing: border-box;
      overflow: auto;
    }

    .section.picture {
      height: 25%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .section.contact, .section.skills {
      flex: 1; /* Share remaining space equally */
    }

    .right-panel {
      width: 70%;
      background-color: #ffffff;
    }

    img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
  </style>
</head>
<body>

  <div class="full-screen-div">
    <div class="left-panel">
      <div class="section picture">
        <img src="Croped.jpg" alt="Profile Picture">
      </div>

      <div class="section contact">
        <h3>Contact</h3>
        <p>Email: example@example.com</p>
        <p>Phone: +123 456 7890</p>
      </div>

      <div class="section skills">
        <h3>Skills</h3>
        <p>- HTML</p>
        <p>- CSS</p>
        <p>- JavaScript</p>
        <h3>Skills</h3>
        <p>- HTML</p>
        <p>- CSS</p>
        <p>- JavaScript</p>
        <h3>Skills</h3>
        <p>- HTML</p>
        <p>- CSS</p>
        <p>- JavaScript</p>
      </div>
    </div>

    <div class="right-panel">
      <!-- Right 70% content -->
    </div>
  </div>

</body>
</html>
